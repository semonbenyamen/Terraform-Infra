name: IaC Workflow (Terraform)
run-name: terraform ${{ inputs.action }}
on:
    workflow_dispatch:
        inputs:
            action:
                type: choice
                options:
                - apply
                - destroy
                - plan

jops:
    terraform-action:
        runs-on: ubuntu-latest
        steps:
        - name: Clone Github Rebo
          uses: actuion/chechout@v4


        - name: Configure AWS Credential
          uses: aws-action/Configure-aws-credential@v4
          with: 
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-access-access-key: ${{ secrets.AWS_ACCESS_ACCESS_KEY_ID }}
        - name: Infra initiate
          run: Terraform init
        - name: Terraform apply
          if: ${{ inputs.action == 'apply' }}
          run: terraform apply -auto-approve